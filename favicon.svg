<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="RPCortex">
  <defs>
    <linearGradient id="rpc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cdfff"/>
      <stop offset=".5" stop-color="#4a7cff"/>
      <stop offset="1" stop-color="#c46cff"/>
    </linearGradient>
  </defs>

  <!-- pins -->
  <g fill="url(#rpc)">
    <rect x="21" y="6"  width="4" height="8" rx="1.5"/>
    <rect x="30" y="6"  width="4" height="8" rx="1.5"/>
    <rect x="39" y="6"  width="4" height="8" rx="1.5"/>
    <rect x="21" y="50" width="4" height="8" rx="1.5"/>
    <rect x="30" y="50" width="4" height="8" rx="1.5"/>
    <rect x="39" y="50" width="4" height="8" rx="1.5"/>
    <rect x="6"  y="21" width="8" height="4" rx="1.5"/>
    <rect x="6"  y="30" width="8" height="4" rx="1.5"/>
    <rect x="6"  y="39" width="8" height="4" rx="1.5"/>
    <rect x="50" y="21" width="8" height="4" rx="1.5"/>
    <rect x="50" y="30" width="8" height="4" rx="1.5"/>
    <rect x="50" y="39" width="8" height="4" rx="1.5"/>
  </g>

  <!-- chip body -->
  <rect x="14" y="14" width="36" height="36" rx="8" fill="#111722"/>
  <rect x="14" y="14" width="36" height="36" rx="8" fill="none" stroke="url(#rpc)" stroke-width="3"/>
  <!-- pin-1 dot -->
  <circle cx="21" cy="21" r="2" fill="url(#rpc)"/>

  <!-- pulse / heartbeat core (a nod to "Pulsar") -->
  <polyline points="20,33 27,33 30,24 34,42 37,33 44,33"
            fill="none" stroke="url(#rpc)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
